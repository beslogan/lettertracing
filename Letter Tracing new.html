<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Letter Tracing Game</title>

<!-- Primary manuscript-style classroom font -->
<link href="https://fonts.googleapis.com/css2?family=Andika&display=swap" rel="stylesheet">

<style>
  body {
    font-family: Arial, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: #f0f8ff;
  }

  h1 {
    margin-top: 10px;
  }

  canvas {
    border: 3px solid #333;
    background: white;
    touch-action: none;
  }

  button {
    margin-top: 10px;
    padding: 10px 20px;
    font-size: 18px;
    border-radius: 10px;
    border: none;
    background: #4CAF50;
    color: white;
    cursor: pointer;
  }

  button:hover {
    background: #45a049;
  }
</style>
</head>
<body>

<h1>Trace the Letter</h1>

<canvas id="traceCanvas" width="400" height="400"></canvas>

<button onclick="nextLetter()">Next Letter</button>
<button onclick="restartGame()">Play Again</button>

<script>
const canvas = document.getElementById('traceCanvas');
const ctx = canvas.getContext('2d');

let drawing = false;
let progress = 0;
let targetLetter = '';
let remainingLetters = [];
let hasSpokenThisLetter = false;

// Full alphabet uppercase + lowercase
const letters = "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz".split("");

// Shuffle letters so none repeat until finished
function shuffle(array) {
  for (let i = array.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [array[i], array[j]] = [array[j], array[i]];
  }
  return array;
}

function refillLetters() {
  remainingLetters = shuffle([...letters]);
}

function speakLetter(letter) {
  const caseType = letter === letter.toUpperCase() ? "Uppercase" : "Lowercase";
  const message = `${caseType} ${letter.toUpperCase()}`;

  const utterance = new SpeechSynthesisUtterance(message);
  utterance.rate = 0.8;
  speechSynthesis.cancel();
  speechSynthesis.speak(utterance);
}

function drawLetter(letter) {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  ctx.setLineDash([8, 10]);
  ctx.font = "300px 'Andika', Arial, sans-serif";
  ctx.textAlign = "center";
  ctx.textBaseline = "middle";
  ctx.strokeStyle = "#bbbbbb";
  ctx.lineWidth = 6;

  ctx.strokeText(letter, canvas.width / 2, canvas.height / 2);

  ctx.setLineDash([]);
}

function nextLetter() {
  if (remainingLetters.length === 0) refillLetters();

  targetLetter = remainingLetters.pop();
  progress = 0;
  hasSpokenThisLetter = false;

  drawLetter(targetLetter);
}

function restartGame() {
  refillLetters();
  nextLetter();
}

canvas.addEventListener('pointerdown', () => {
  drawing = true;

  // Speak letter once when tracing begins
  if (!hasSpokenThisLetter) {
    speakLetter(targetLetter);
    hasSpokenThisLetter = true;
  }
});

canvas.addEventListener('pointerup', () => {
  drawing = false;

  if (progress > 150) {
    setTimeout(() => {
      nextLetter();
    }, 1200);
  }
});

canvas.addEventListener('pointermove', (e) => {
  if (!drawing) return;

  const rect = canvas.getBoundingClientRect();
  const x = e.clientX - rect.left;
  const y = e.clientY - rect.top;

  ctx.beginPath();
  ctx.arc(x, y, 6, 0, Math.PI * 2);
  ctx.fillStyle = "#4CAF50";
  ctx.fill();

  progress++;
});

// Start game
restartGame();
</script>

</body>
</html>
