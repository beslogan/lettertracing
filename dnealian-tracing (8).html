<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Letter Tracing</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@700&family=Playwrite+NZ&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; touch-action: none; }

  body {
    font-family: 'Nunito', sans-serif;
    background: linear-gradient(135deg, #fef9c3 0%, #fce7f3 50%, #dbeafe 100%);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 14px 10px;
    overflow-x: hidden;
  }

  h1 {
    font-family: 'Fredoka One', cursive;
    font-size: 2rem;
    color: #7c3aed;
    text-shadow: 2px 2px 0 #ddd6fe;
    margin-bottom: 4px;
    text-align: center;
  }

  .subtitle {
    font-size: 1rem;
    color: #6b7280;
    margin-bottom: 12px;
    text-align: center;
  }

  .card {
    background: white;
    border-radius: 24px;
    box-shadow: 0 8px 32px rgba(124,58,237,0.13);
    padding: 16px 18px 20px;
    width: 100%;
    max-width: 600px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
  }

  .progress-label {
    font-size: 0.85rem;
    color: #9ca3af;
    align-self: flex-end;
    font-weight: 700;
  }

  .progress-bar-wrap {
    width: 100%;
    background: #e5e7eb;
    border-radius: 99px;
    height: 10px;
    overflow: hidden;
  }

  .progress-bar {
    height: 100%;
    background: linear-gradient(90deg, #a78bfa, #7c3aed);
    border-radius: 99px;
    transition: width 0.4s ease;
  }

  .case-toggle {
    display: flex;
    gap: 6px;
    background: #f3f4f6;
    border-radius: 12px;
    padding: 4px;
  }

  .case-toggle button {
    font-family: 'Nunito', sans-serif;
    font-weight: 700;
    font-size: 0.9rem;
    background: transparent;
    border: none;
    padding: 6px 16px;
    border-radius: 9px;
    color: #6b7280;
    cursor: pointer;
    transition: background 0.15s, color 0.15s;
  }

  .case-toggle button.active {
    background: white;
    color: #7c3aed;
    box-shadow: 0 1px 4px rgba(0,0,0,0.12);
  }

  .canvas-wrap {
    position: relative;
    width: 100%;
    border-radius: 18px;
    overflow: hidden;
    background: #fffbeb;
    border: 3px dashed #fbbf24;
  }

  canvas { display: block; width: 100%; touch-action: none; }
  #guideCanvas { position: absolute; top: 0; left: 0; pointer-events: none; }
  #traceCanvas { position: relative; cursor: crosshair; }

  #feedbackMsg {
    font-family: 'Fredoka One', cursive;
    font-size: 1.5rem;
    color: #059669;
    min-height: 2.2rem;
    text-align: center;
  }

  .btn-row {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    justify-content: center;
    width: 100%;
  }

  .btn-row button {
    font-family: 'Nunito', sans-serif;
    font-weight: 700;
    font-size: 1.1rem;
    border: none;
    border-radius: 14px;
    padding: 13px 24px;
    cursor: pointer;
    flex: 1;
    min-width: 120px;
    box-shadow: 0 3px 8px rgba(0,0,0,0.12);
    transition: transform 0.1s;
  }

  .btn-row button:active { transform: scale(0.96); }
  #btnClear { background: #fee2e2; color: #b91c1c; }
  #btnNext  { background: #d1fae5; color: #065f46; }

  .hint-text {
    font-size: 0.85rem;
    color: #9ca3af;
    text-align: center;
  }

  .star-burst {
    position: fixed;
    pointer-events: none;
    z-index: 999;
    font-size: 2.4rem;
    animation: starfly 1s ease-out forwards;
  }

  @keyframes starfly {
    0%   { opacity: 1; transform: translateY(0) scale(1); }
    100% { opacity: 0; transform: translateY(-90px) scale(1.6); }
  }
</style>
</head>
<body>

<h1>✏️ Letter Tracing</h1>
<p class="subtitle">Trace the letter with your finger!</p>

<div class="card">

  <div class="progress-label" id="progressLabel">Letter 1 of 26</div>
  <div class="progress-bar-wrap" style="width:100%">
    <div class="progress-bar" id="progressBar" style="width:3.85%"></div>
  </div>

  <div class="case-toggle">
    <button id="btnUpper" class="active" onclick="setMode('upper')">Uppercase</button>
    <button id="btnLower" onclick="setMode('lower')">Lowercase</button>
    <button id="btnRandom" onclick="setMode('random')">Random</button>
  </div>

  <div class="canvas-wrap" id="canvasWrap">
    <canvas id="guideCanvas"></canvas>
    <canvas id="traceCanvas"></canvas>
  </div>

  <div id="feedbackMsg"></div>

  <div class="btn-row">
    <button id="btnClear" onclick="clearTrace()">🧹 Try Again</button>
    <button id="btnNext"  onclick="nextLetter()">Next Letter ➜</button>
  </div>

  <p class="hint-text">Use your finger to trace the letter</p>
</div>

<script>
const LETTERS = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('');

let mode = 'upper';
let letterIndex = 0;
let letterOrder = [...LETTERS];
let currentLetter = 'A';
let isUpper = true;
let isDrawing = false;
let tracePoints = 0;
let praised = false;

const guideCanvas = document.getElementById('guideCanvas');
const traceCanvas = document.getElementById('traceCanvas');
const gctx = guideCanvas.getContext('2d');
const tctx = traceCanvas.getContext('2d');

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function setMode(m) {
  mode = m;
  ['Upper','Lower','Random'].forEach(x => {
    document.getElementById('btn' + x).classList.toggle('active', m === x.toLowerCase());
  });
  letterIndex = 0;
  letterOrder = m === 'random' ? shuffle([...LETTERS]) : [...LETTERS];
  loadLetter();
}

function loadLetter() {
  currentLetter = letterOrder[letterIndex % 26];
  isUpper = mode === 'upper' ? true : mode === 'lower' ? false : Math.random() < 0.5;

  const pct = ((letterIndex % 26) + 1) / 26 * 100;
  document.getElementById('progressBar').style.width = pct + '%';
  document.getElementById('progressLabel').textContent = `Letter ${(letterIndex % 26) + 1} of 26`;

  praised = false;
  tracePoints = 0;
  hasSpokenForLetter = false;
  document.getElementById('feedbackMsg').textContent = '';
  resizeCanvases();
}

function resizeCanvases() {
  const wrap = document.getElementById('canvasWrap');
  const W = wrap.clientWidth;
  // Taller canvas for lowercase so descenders (g,q,y,p,j) don't clip
  const H = Math.round(W * (!isUpper ? 0.55 : 0.45));

  [guideCanvas, traceCanvas].forEach(c => {
    c.width  = Math.round(W * devicePixelRatio);
    c.height = Math.round(H * devicePixelRatio);
    c.style.height = H + 'px';
  });
  wrap.style.height = H + 'px';

  gctx.setTransform(1,0,0,1,0,0);
  tctx.setTransform(1,0,0,1,0,0);
  gctx.scale(devicePixelRatio, devicePixelRatio);
  tctx.scale(devicePixelRatio, devicePixelRatio);

  drawGuide(W, H);
  clearTrace();
}

function drawGuide(W, H) {
  gctx.clearRect(0, 0, W, H);

  // For lowercase, baseline sits higher to leave room for descenders (g,q,y,p,j,f)
  const hasDescenders = !isUpper;
  const baseLine = hasDescenders ? H * 0.60 : H * 0.83;
  const topLine  = H * 0.08;
  const midLine  = hasDescenders ? H * 0.35 : H * 0.50;

  // Ruling lines
  [topLine, midLine].forEach(y => {
    gctx.strokeStyle = '#fde68a';
    gctx.lineWidth = 1;
    gctx.beginPath(); gctx.moveTo(16, y); gctx.lineTo(W - 16, y); gctx.stroke();
  });
  gctx.strokeStyle = '#fbbf24';
  gctx.lineWidth = 1.5;
  gctx.beginPath(); gctx.moveTo(16, baseLine); gctx.lineTo(W - 16, baseLine); gctx.stroke();

  const displayChar = isUpper ? currentLetter : currentLetter.toLowerCase();
  const fontSize = hasDescenders ? Math.round(H * 0.45) : Math.round(H * 0.62);
  const fontStr = `${fontSize}px "Playwrite NZ", cursive`;

  // Thick dotted stroke — the tracing guide
  gctx.save();
  gctx.font = fontStr;
  gctx.textAlign = 'center';
  gctx.textBaseline = 'alphabetic';

  const yPos = baseLine + 2;

  // Light fill so letter interior looks hollow/block style
  gctx.globalAlpha = 1;
  gctx.fillStyle = '#f5f3ff';
  gctx.fillText(displayChar, W / 2, yPos);

  // Bold purple outline to form the manuscript letter border
  gctx.strokeStyle = '#7c3aed';
  gctx.lineWidth = fontSize * 0.03;
  gctx.setLineDash([]);
  gctx.lineCap = 'round';
  gctx.lineJoin = 'round';
  gctx.strokeText(displayChar, W / 2, yPos);

  gctx.restore();

}

function getPos(e) {
  const rect = traceCanvas.getBoundingClientRect();
  const sx = traceCanvas.width / devicePixelRatio / rect.width;
  const sy = traceCanvas.height / devicePixelRatio / rect.height;
  const src = e.touches ? e.touches[0] : e;
  return [(src.clientX - rect.left) * sx, (src.clientY - rect.top) * sy];
}

traceCanvas.addEventListener('touchstart', e => {
  e.preventDefault(); isDrawing = true;
  const [x,y] = getPos(e); tctx.beginPath(); tctx.moveTo(x,y);
}, { passive: false });

traceCanvas.addEventListener('touchmove', e => {
  e.preventDefault(); if (isDrawing) doDraw(e);
}, { passive: false });

traceCanvas.addEventListener('touchend', e => {
  e.preventDefault(); isDrawing = false; checkTrace();
}, { passive: false });

traceCanvas.addEventListener('mousedown', e => {
  isDrawing = true; const [x,y]=getPos(e); tctx.beginPath(); tctx.moveTo(x,y);
});
traceCanvas.addEventListener('mousemove', e => { if (isDrawing) doDraw(e); });
traceCanvas.addEventListener('mouseup', () => { isDrawing = false; checkTrace(); });
traceCanvas.addEventListener('mouseleave', () => { if (isDrawing) { isDrawing = false; checkTrace(); } });

let hasSpokenForLetter = false;

function speakLetter() {
  if (!window.speechSynthesis) return;
  speechSynthesis.cancel();
  const caseWord = isUpper ? 'Uppercase' : 'Lowercase';
  const letterName = currentLetter.toUpperCase();
  const u = new SpeechSynthesisUtterance(`${caseWord}. ${letterName}.`);
  u.rate = 0.85;
  u.pitch = 1.1;
  u.volume = 1;
  speechSynthesis.speak(u);
}

function doDraw(e) {
  if (!hasSpokenForLetter) {
    hasSpokenForLetter = true;
    speakLetter();
  }
  const [x,y] = getPos(e);
  tctx.lineTo(x, y);
  tctx.strokeStyle = '#f472b6';
  tctx.lineWidth = 22;
  tctx.lineCap = 'round';
  tctx.lineJoin = 'round';
  tctx.globalAlpha = 0.75;
  tctx.stroke();
  tctx.beginPath();
  tctx.moveTo(x, y);
  tracePoints++;
}

function checkTrace() {
  if (tracePoints > 55 && !praised) {
    praised = true;
    const msgs = ['Great job! ⭐', 'Awesome! 🌟', 'You did it! ✨', 'Wow! 🎉', 'Nice work! 💫', 'Super! 🌈'];
    document.getElementById('feedbackMsg').textContent = msgs[Math.floor(Math.random() * msgs.length)];
    spawnStars();
  }
}

function spawnStars() {
  const emojis = ['⭐','🌟','✨','💜','🎉','🌈'];
  for (let i = 0; i < 7; i++) {
    setTimeout(() => {
      const el = document.createElement('div');
      el.className = 'star-burst';
      el.textContent = emojis[Math.floor(Math.random() * emojis.length)];
      el.style.left = (15 + Math.random() * 65) + 'vw';
      el.style.top  = (25 + Math.random() * 40) + 'vh';
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 1100);
    }, i * 110);
  }
}

function clearTrace() {
  const W = traceCanvas.width / devicePixelRatio;
  const H = traceCanvas.height / devicePixelRatio;
  tctx.clearRect(0, 0, W, H);
  tracePoints = 0;
  praised = false;
  document.getElementById('feedbackMsg').textContent = '';
}

function nextLetter() {
  letterIndex = (letterIndex + 1) % 26;
  if (letterIndex === 0 && mode === 'random') shuffle(letterOrder);
  loadLetter();
}

window.addEventListener('resize', resizeCanvases);
document.fonts.load(`80px "Playwrite NZ"`).then(() => loadLetter()).catch(() => loadLetter());
</script>
</body>
</html>
