<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Letter Tracing - Student Edition</title>
    <style>
        :root {
            --bg-color: #f8fafc;
            --primary: #6366f1;
            --font-family: 'Century Gothic', CenturyGothic, AppleGothic, sans-serif;
        }

        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: var(--bg-color);
            font-family: var(--font-family);
            overflow: hidden;
            touch-action: none;
        }

        #audio-unlock {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: white;
            z-index: 100;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            text-align: center;
        }

        .game-header { text-align: center; margin-bottom: 10px; }
        h1 { color: #1e293b; margin: 0; font-size: 2rem; }
        #counter { color: #64748b; font-weight: bold; margin-top: 5px; }

        .game-container {
            position: relative;
            background: white;
            border: 12px solid #e2e8f0;
            border-radius: 40px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.1);
            width: 500px;
            height: 500px;
        }

        /* Standard hollow style */
        #letter-display {
            font-size: 380px;
            font-weight: bold;
            color: transparent;
            -webkit-text-stroke: 3px #cbd5e1;
            user-select: none;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 1;
            pointer-events: none;
        }

        /* Specific fix for Uppercase I to distinguish from lowercase l */
        #letter-display.serif-fix {
            font-family: "Times New Roman", serif;
            -webkit-text-stroke: 4px #cbd5e1;
        }

        canvas {
            position: absolute;
            top: 0; left: 0;
            z-index: 2;
            cursor: crosshair;
        }

        .controls { margin-top: 25px; display: flex; gap: 20px; }

        button {
            padding: 18px 40px;
            font-size: 24px;
            font-weight: bold;
            cursor: pointer;
            border: none;
            border-radius: 24px;
            color: white;
            transition: all 0.1s;
            box-shadow: 0 4px 0px rgba(0,0,0,0.2);
        }

        button:active { transform: translateY(4px); box-shadow: none; }
        .clear { background: #f43f5e; }
        .next { background: #10b981; }
    </style>
</head>
<body>

    <div id="audio-unlock" onclick="this.style.display='none'; initGame();">
        <h1 style="font-size: 3rem;">Touch to Play! 🎨</h1>
        <p>Let's practice our letters together.</p>
    </div>

    <div class="game-header">
        <h1>Trace the Letter</h1>
        <p id="counter">Letter 1 of 52</p>
    </div>

    <div class="game-container">
        <div id="letter-display">A</div>
        <canvas id="paintCanvas" width="500" height="500"></canvas>
    </div>

    <div class="controls">
        <button class="clear" onclick="clearCanvas()">Erase</button>
        <button class="next" onclick="nextLetter()">Next →</button>
    </div>

    <script>
        const canvas = document.getElementById('paintCanvas');
        const ctx = canvas.getContext('2d');
        const letterDisplay = document.getElementById('letter-display');
        const counterDisplay = document.getElementById('counter');
        
        let painting = false;
        let hasSpoken = false;
        let currentIdx = 0;
        let alphabet = [];

        // Audio Context for the "Success" beep
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        function playSuccessSound() {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.type = 'sine';
            osc.frequency.setValueAtTime(523.25, audioCtx.currentTime); // C5
            osc.frequency.exponentialRampToValueAtTime(880, audioCtx.currentTime + 0.1); // A5
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.3);
        }

        function createAlphabet() {
            const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz".split("");
            alphabet = chars.map(char => {
                const isUpper = (char === char.toUpperCase() && char !== char.toLowerCase());
                return { 
                    char: char, 
                    voiceText: isUpper ? `Upper case ${char}` : `Lower case ${char}`,
                    isUpperI: (char === 'I')
                };
            });
            shuffle(alphabet);
        }

        function shuffle(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
        }

        function initGame() {
            if (alphabet.length === 0) createAlphabet();
            currentIdx = 0;
            displayLetter();
        }

        function displayLetter() {
            const current = alphabet[currentIdx];
            letterDisplay.innerText = current.char;
            
            // Toggle the serif class only for Uppercase I
            if (current.isUpperI) {
                letterDisplay.classList.add('serif-fix');
            } else {
                letterDisplay.classList.remove('serif-fix');
            }

            counterDisplay.innerText = `Letter ${currentIdx + 1} of 52`;
            hasSpoken = false;
            clearCanvas();
        }

        function speak() {
            if (hasSpoken) return;
            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(alphabet[currentIdx].voiceText);
            utterance.rate = 0.85;
            window.speechSynthesis.speak(utterance);
            hasSpoken = true;
        }

        function startDrawing(e) {
            painting = true;
            speak();
            draw(e);
        }

        function stopDrawing() {
            painting = false;
            ctx.beginPath();
        }

        function draw(e) {
            if (!painting) return;
            const rect = canvas.getBoundingClientRect();
            const x = (e.clientX || (e.touches && e.touches[0].clientX)) - rect.left;
            const y = (e.clientY || (e.touches && e.touches[0].clientY)) - rect.top;

            ctx.lineWidth = 22;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            ctx.strokeStyle = '#6366f1';

            ctx.lineTo(x, y);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(x, y);
        }

        function clearCanvas() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
        }

        function nextLetter() {
            playSuccessSound();
            currentIdx++;
            if (currentIdx >= alphabet.length) {
                alert("You're a superstar! You finished all the letters!");
                initGame();
            } else {
                displayLetter();
            }
        }

        // Listeners
        canvas.addEventListener('mousedown', startDrawing);
        canvas.addEventListener('mousemove', draw);
        window.addEventListener('mouseup', stopDrawing);

        canvas.addEventListener('touchstart', (e) => { e.preventDefault(); startDrawing(e); });
        canvas.addEventListener('touchmove', (e) => { e.preventDefault(); draw(e); });
        canvas.addEventListener('touchend', stopDrawing);

    </script>
</body>
</html>
